services:
  db:
    image: postgres:16-alpine
    container_name: blogapi-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: blogapi-db
    ports:
      - "5432:5432"
    volumes:
      - blogapi-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d blogapi-db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - blogapi-net

  smtp4dev:
    image: rnwood/smtp4dev:v3
    container_name: blogapi-smtp4dev
    restart: unless-stopped
    ports:
      - "5001:80"
      - "2525:25"
    volumes:
      - blogapi-smtp4dev-data:/smtp4dev
    environment:
      ServerOptions__HostName: smtp4dev
    networks:
      - blogapi-net

  api:
    build:
      context: .
      dockerfile: BlogAPI/Dockerfile
    container_name: blogapi-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      smtp4dev:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=blogapi-db;Username=postgres;Password=postgres"
      JWT__Secret: ${JWT_SECRET}
      JWT__Issuer: ${JWT_ISSUER}
      JWT__Audience: ${JWT_AUDIENCE}
      Smtp__Host: smtp4dev
      Smtp__Port: "25"
    ports:
      - "8080:8080"
    networks:
      - blogapi-net

volumes:
  blogapi-db-data:
  blogapi-smtp4dev-data:

networks:
  blogapi-net:
    driver: bridge